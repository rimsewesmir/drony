<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Low-Poly Survival</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30px;
            height: 30px;
            pointer-events: none;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background-color: rgba(0, 255, 255, 0.8);
            box-shadow: 0 0 5px rgba(0, 255, 255, 0.5);
        }
        #crosshair::before { top: 14px; left: 0; width: 30px; height: 2px; }
        #crosshair::after { top: 0; left: 14px; width: 2px; height: 30px; }

        #hud {
            position: absolute;
            bottom: 30px;
            left: 30px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            font-size: 32px;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        #hp-bar-container {
            width: 300px;
            height: 20px;
            background: rgba(0,0,0,0.5);
            border: 2px solid white;
            border-radius: 10px;
            overflow: hidden;
        }
        #hp-bar-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff0000, #ff4444);
            transition: width 0.3s ease;
        }

        #menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            pointer-events: auto;
            z-index: 10;
        }
        #menu h1 {
            font-size: 4rem;
            margin-bottom: 10px;
            color: #00ffff;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }
        #start-btn {
            padding: 20px 60px;
            font-size: 1.8rem;
            background-color: #00ffff;
            color: black;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
        }
        #start-btn:hover { 
            background-color: #ffffff;
            transform: scale(1.1);
        }
        
        #damage-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(255, 0, 0, 0);
            pointer-events: none;
            transition: background-color 0.1s;
        }
        #msg-box {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            color: #00ffff;
            font-size: 24px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.5s;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="game-container"></div>
    
    <div id="ui-layer">
        <div id="damage-overlay"></div>
        <div id="msg-box">HP +20!</div>
        <div id="hud">
            <div>ŽIVOTY</div>
            <div id="hp-bar-container">
                <div id="hp-bar-fill"></div>
            </div>
        </div>
        <div id="crosshair"></div>
    </div>

    <div id="menu">
        <h1 id="menu-title">LOW-POLY SURVIVAL</h1>
        <p id="menu-sub">Znič drona pro získání HP. Přežij co nejdéle!</p>
        <button id="start-btn">HRÁT</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- NASTAVENÍ SCÉNY ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x6ec6ff);
        scene.fog = new THREE.Fog(0x6ec6ff, 20, 100);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('game-container').appendChild(renderer.domElement);

        // --- OSVĚTLENÍ ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const sun = new THREE.DirectionalLight(0xfff5e6, 1.2);
        sun.position.set(100, 100, 50);
        sun.castShadow = true;
        sun.shadow.camera.left = sun.shadow.camera.bottom = -100;
        sun.shadow.camera.right = sun.shadow.camera.top = 100;
        sun.shadow.mapSize.set(2048, 2048);
        scene.add(sun);

        // --- HERNÍ STAV ---
        let playerHealth = 100;
        let isGameOver = false;
        const collidableObjects = []; 
        const particles = [];
        let bot;
        
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        
        // OPRAVA: Deklarace proměnných pro pohyb
        let moveForward = false;
        let moveBackward = false;
        let moveLeft = false;
        let moveRight = false;
        let canJump = false;
        const playerRadius = 0.8; 

        // --- GENERATOR TERÉNU ---
        function getTerrainHeight(x, z) {
            return Math.sin(x / 8) * Math.cos(z / 8) * 2.5 + Math.sin(x / 20) * 4;
        }

        const worldSize = 250;
        const terrainGeo = new THREE.PlaneGeometry(worldSize, worldSize, 60, 60);
        terrainGeo.rotateX(-Math.PI / 2);
        const posAttr = terrainGeo.attributes.position;
        for (let i = 0; i < posAttr.count; i++) {
            const x = posAttr.getX(i);
            const z = posAttr.getZ(i);
            posAttr.setY(i, getTerrainHeight(x, z));
        }
        terrainGeo.computeVertexNormals();

        const terrainMat = new THREE.MeshStandardMaterial({ 
            color: 0x55aa44, 
            flatShading: true,
            roughness: 0.9
        });
        const terrain = new THREE.Mesh(terrainGeo, terrainMat);
        terrain.receiveShadow = true;
        scene.add(terrain);

        // Dekorace
        function addDecoration() {
            const treeTrunkGeo = new THREE.CylinderGeometry(0.4, 0.6, 4, 6);
            const treeTrunkMat = new THREE.MeshStandardMaterial({ color: 0x4d2a1a, flatShading: true });
            const leavesGeo = new THREE.DodecahedronGeometry(2.5, 1);
            const leavesMat = new THREE.MeshStandardMaterial({ color: 0x1b5e20, flatShading: true });
            const flowerGeo = new THREE.BoxGeometry(0.2, 0.2, 0.2);

            for (let i = 0; i < 150; i++) {
                const x = (Math.random() - 0.5) * worldSize * 0.9;
                const z = (Math.random() - 0.5) * worldSize * 0.9;
                if (Math.abs(x) < 15 && Math.abs(z) < 15) continue;
                const y = getTerrainHeight(x, z);

                const type = Math.random();
                if (type > 0.4) {
                    const group = new THREE.Group();
                    const trunk = new THREE.Mesh(treeTrunkGeo, treeTrunkMat);
                    trunk.position.y = 2;
                    trunk.castShadow = true;
                    group.add(trunk);
                    const leaves = new THREE.Mesh(leavesGeo, leavesMat);
                    leaves.position.y = 4.5;
                    leaves.castShadow = true;
                    group.add(leaves);
                    group.position.set(x, y, z);
                    scene.add(group);
                    collidableObjects.push({ mesh: trunk, radius: 1.2, pos: new THREE.Vector3(x, y, z) });
                } else if (type > 0.1) {
                    const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(1.5, 0), new THREE.MeshStandardMaterial({color: 0x888888, flatShading: true}));
                    rock.position.set(x, y + 0.5, z);
                    rock.rotation.set(Math.random(), Math.random(), 0);
                    rock.castShadow = true;
                    scene.add(rock);
                    collidableObjects.push({ mesh: rock, radius: 1.8, pos: new THREE.Vector3(x, y, z) });
                } else {
                    const flower = new THREE.Mesh(flowerGeo, new THREE.MeshBasicMaterial({color: Math.random() > 0.5 ? 0xff00ff : 0xffff00}));
                    flower.position.set(x, y + 0.1, z);
                    scene.add(flower);
                }
            }
        }
        addDecoration();

        // Mraky
        const cloudGeo = new THREE.SphereGeometry(3, 7, 7);
        const cloudMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.8 });
        for(let i=0; i<20; i++) {
            const cloud = new THREE.Group();
            for(let j=0; j<3; j++) {
                const m = new THREE.Mesh(cloudGeo, cloudMat);
                m.position.set(j*3, Math.random()*2, Math.random()*2);
                m.scale.set(1, 0.6, 0.8);
                cloud.add(m);
            }
            cloud.position.set((Math.random()-0.5)*200, 30 + Math.random()*15, (Math.random()-0.5)*200);
            scene.add(cloud);
        }

        // --- HRÁČ A ZBRAŇ ---
        const controls = new PointerLockControls(camera, document.body);
        camera.position.y = 5;

        const gunGroup = new THREE.Group();
        const gunBody = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.2, 0.7), new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.9 }));
        gunBody.position.set(0.3, -0.25, -0.5);
        gunGroup.add(gunBody);
        const muzzle = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.1), new THREE.MeshBasicMaterial({color: 0x00ffff}));
        muzzle.rotation.x = Math.PI/2;
        muzzle.position.set(0.3, -0.25, -0.85);
        gunGroup.add(muzzle);
        camera.add(gunGroup);
        scene.add(camera);

        // --- NEPŘÍTEL ---
        class EnemyBot {
            constructor() {
                this.mesh = new THREE.Group();
                const core = new THREE.Mesh(new THREE.IcosahedronGeometry(1.5, 0), new THREE.MeshStandardMaterial({ color: 0x333333, flatShading: true, metalness: 0.8 }));
                this.mesh.add(core);
                const eye = new THREE.Mesh(new THREE.SphereGeometry(0.5, 8, 8), new THREE.MeshBasicMaterial({ color: 0xff0000 }));
                eye.position.z = 1.1;
                eye.name = "CRIT";
                this.mesh.add(eye);
                const ring = new THREE.Mesh(new THREE.TorusGeometry(1.8, 0.1, 8, 20), new THREE.MeshStandardMaterial({ color: 0x00ffff }));
                ring.rotation.x = Math.PI/2;
                this.mesh.add(ring);
                scene.add(this.mesh);
                this.lastShot = 0;
                this.spawn();
            }
            spawn() {
                this.hp = 100;
                const angle = Math.random() * Math.PI * 2;
                const dist = 40 + Math.random() * 20;
                this.mesh.position.set(camera.position.x + Math.cos(angle)*dist, 10, camera.position.z + Math.sin(angle)*dist);
            }
            update(delta) {
                if (isGameOver) return;
                this.mesh.lookAt(camera.position);
                const targetY = getTerrainHeight(this.mesh.position.x, this.mesh.position.z) + 6 + Math.sin(performance.now()*0.002)*2;
                this.mesh.position.y = THREE.MathUtils.lerp(this.mesh.position.y, targetY, 0.05);
                const dir = new THREE.Vector3().subVectors(camera.position, this.mesh.position).normalize();
                this.mesh.position.addScaledVector(dir, 12 * delta);
                if (performance.now() - this.lastShot > 1800) {
                    this.shoot();
                    this.lastShot = performance.now();
                }
            }
            shoot() {
                createLaser(this.mesh.position.clone(), camera.position.clone(), 0xff0000);
                updateHP(-15);
            }
            takeDamage(amount, isCrit) {
                this.hp -= amount;
                if (this.hp <= 0) {
                    createExplosion(this.mesh.position);
                    updateHP(20);
                    showMsg(isCrit ? "KRITICKÝ ZÁSAH! HP +20" : "HP +20");
                    this.mesh.position.y = -100;
                    setTimeout(() => this.spawn(), 1500);
                }
            }
        }
        bot = new EnemyBot();

        // --- FUNKCE ---
        function updateHP(val) {
            playerHealth = Math.min(100, playerHealth + val);
            const fill = document.getElementById('hp-bar-fill');
            fill.style.width = playerHealth + "%";
            if (val < 0) {
                const overlay = document.getElementById('damage-overlay');
                overlay.style.backgroundColor = 'rgba(255, 0, 0, 0.4)';
                setTimeout(() => overlay.style.backgroundColor = 'transparent', 100);
            }
            if (playerHealth <= 0 && !isGameOver) endGame();
        }

        function showMsg(text) {
            const box = document.getElementById('msg-box');
            box.innerText = text;
            box.style.opacity = 1;
            setTimeout(() => box.style.opacity = 0, 1000);
        }

        function createLaser(start, end, color) {
            const mat = new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 1 });
            const geo = new THREE.BufferGeometry().setFromPoints([start, end]);
            const line = new THREE.Line(geo, mat);
            scene.add(line);
            let frame = 0;
            function fade() {
                frame++;
                mat.opacity -= 0.1;
                if (frame < 10) requestAnimationFrame(fade);
                else scene.remove(line);
            }
            fade();
        }

        function createExplosion(pos) {
            for(let i=0; i<20; i++) {
                const p = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), new THREE.MeshBasicMaterial({color: 0xffaa00}));
                p.position.copy(pos);
                p.velocity = new THREE.Vector3((Math.random()-0.5)*15, (Math.random()-0.5)*15, (Math.random()-0.5)*15);
                p.life = 1.0;
                scene.add(p);
                particles.push(p);
            }
        }

        function endGame() {
            isGameOver = true;
            controls.unlock();
            document.getElementById('menu-title').innerText = "KONEC HRY";
            document.getElementById('menu-sub').innerText = "Byl jsi zničen roboty.";
            document.getElementById('start-btn').innerText = "ZKUSIT ZNOVU";
            document.getElementById('menu').style.display = 'flex';
        }

        // --- OVLÁDÁNÍ ---
        document.getElementById('start-btn').addEventListener('click', () => {
            if (isGameOver) location.reload();
            controls.lock();
        });
        controls.addEventListener('lock', () => document.getElementById('menu').style.display = 'none');
        controls.addEventListener('unlock', () => { if(!isGameOver) document.getElementById('menu').style.display = 'flex'; });

        const onKeyDown = (e) => {
            switch(e.code) {
                case 'KeyW': case 'ArrowUp': moveForward = true; break;
                case 'KeyS': case 'ArrowDown': moveBackward = true; break;
                case 'KeyA': case 'ArrowLeft': moveLeft = true; break;
                case 'KeyD': case 'ArrowRight': moveRight = true; break;
                case 'Space': if(canJump) velocity.y += 28; canJump = false; break;
            }
        };
        const onKeyUp = (e) => {
            switch(e.code) {
                case 'KeyW': case 'ArrowUp': moveForward = false; break;
                case 'KeyS': case 'ArrowDown': moveBackward = false; break;
                case 'KeyA': case 'ArrowLeft': moveLeft = false; break;
                case 'KeyD': case 'ArrowRight': moveRight = false; break;
            }
        };
        document.addEventListener('keydown', onKeyDown);
        document.addEventListener('keyup', onKeyUp);

        const raycaster = new THREE.Raycaster();
        document.addEventListener('mousedown', () => {
            if (!controls.isLocked || isGameOver) return;
            gunGroup.position.z += 0.15;
            setTimeout(() => gunGroup.position.z -= 0.15, 50);
            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const intersects = raycaster.intersectObject(bot.mesh, true);
            const start = new THREE.Vector3();
            muzzle.getWorldPosition(start);
            let end = new THREE.Vector3();
            raycaster.ray.at(100, end);
            if (intersects.length > 0) {
                const hit = intersects[0];
                end = hit.point;
                const isCrit = hit.object.name === "CRIT";
                bot.takeDamage(isCrit ? 100 : 40, isCrit);
            }
            createLaser(start, end, 0x00ffff);
        });

        // --- SMYČKA ---
        let prevTime = performance.now();
        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now();
            const delta = (time - prevTime) / 1000;

            if (controls.isLocked && !isGameOver) {
                velocity.x -= velocity.x * 12.0 * delta;
                velocity.z -= velocity.z * 12.0 * delta;
                velocity.y -= 80 * delta;

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                const currentSpeed = 70.0;
                if (moveForward || moveBackward) velocity.z -= direction.z * currentSpeed * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * currentSpeed * delta;

                const moveX = -velocity.x * delta;
                const moveZ = -velocity.z * delta;
                let canMoveX = true;
                let canMoveZ = true;

                collidableObjects.forEach(obj => {
                    const dist = new THREE.Vector2(camera.position.x + moveX, camera.position.z).distanceTo(new THREE.Vector2(obj.pos.x, obj.pos.z));
                    if (dist < obj.radius + playerRadius) canMoveX = false;
                    const distZ = new THREE.Vector2(camera.position.x, camera.position.z + moveZ).distanceTo(new THREE.Vector2(obj.pos.x, obj.pos.z));
                    if (distZ < obj.radius + playerRadius) canMoveZ = false;
                });

                if (canMoveX) controls.moveRight(-velocity.x * delta);
                if (canMoveZ) controls.moveForward(-velocity.z * delta);
                
                camera.position.y += (velocity.y * delta);
                const groundY = getTerrainHeight(camera.position.x, camera.position.z) + 2.5;
                if (camera.position.y < groundY) {
                    velocity.y = 0;
                    camera.position.y = groundY;
                    canJump = true;
                }
                if (moveForward || moveBackward || moveLeft || moveRight) {
                    gunGroup.position.y = -0.1 + Math.sin(time * 0.015) * 0.02;
                }
            }
            bot.update(delta);
            for(let i=particles.length-1; i>=0; i--) {
                const p = particles[i];
                p.position.addScaledVector(p.velocity, delta);
                p.life -= delta;
                p.scale.multiplyScalar(0.95);
                if(p.life <= 0) {
                    scene.remove(p);
                    particles.splice(i, 1);
                }
            }
            renderer.render(scene, camera);
            prevTime = time;
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
